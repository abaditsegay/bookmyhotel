server {
    # Support both domain and www subdomain
    server_name shegeroom.com www.shegeroom.com;
    
    # Frontend - serve React build files
    location / {
        root /opt/bookmyhotel/frontend;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
        
        # Enable gzip compression
        gzip on;
        gzip_types
            application/javascript
            application/json
            text/css
            text/javascript
            text/plain;
        
        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
    
    # Backend API - proxy to Spring Boot application
    location /managemyhotel/ {
        proxy_pass http://localhost:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;  # Force HTTPS in forwarded proto
        
        # REMOVED ALL CORS HEADERS - Let Spring Boot handle CORS to prevent conflicts
        # The duplicate CORS headers were causing the authentication error
        
        # Increase timeout for backend requests
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    # Enhanced security headers for Chrome compliance - stricter mixed content policy
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Add CSP to prevent mixed content issues
    add_header Content-Security-Policy "default-src 'self' https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: https:; font-src 'self' data: https:; connect-src 'self' https: wss:; upgrade-insecure-requests;" always;
    
    # Hide nginx version
    server_tokens off;
    
    # Prevent access to hidden files
    location ~ /\. {
        deny all;
    }

    listen 443 ssl http2; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/shegeroom.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/shegeroom.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

# Separate server block for IP access - redirects to domain (prefer www)
server {
    listen 443 ssl http2;
    server_name 44.204.49.94;
    
    ssl_certificate /etc/letsencrypt/live/shegeroom.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shegeroom.com/privkey.pem;
    
    # Redirect IP access to www domain to avoid certificate mismatch
    return 301 https://www.shegeroom.com$request_uri;
}

# HTTP to HTTPS redirect for domain (redirect to www)
server {
    listen 80;
    server_name shegeroom.com;
    return 301 https://www.shegeroom.com$request_uri;
}

# HTTP to HTTPS redirect for www subdomain
server {
    listen 80;
    server_name www.shegeroom.com;
    return 301 https://www.shegeroom.com$request_uri;
}

# HTTP to HTTPS redirect for IP (redirect to www)
server {
    listen 80;
    server_name 44.204.49.94;
    return 301 https://www.shegeroom.com$request_uri;
}
