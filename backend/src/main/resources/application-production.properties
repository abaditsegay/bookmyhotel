# Production Configuration Profile
spring.profiles.active=production

# Application Configuration
spring.application.name=bookmyhotel-backend
server.servlet.context-path=/managemyhotel

# Database Configuration
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Production HikariCP Connection Pool Configuration
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.minimum-idle=25
spring.datasource.hikari.maximum-pool-size=40
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.connection-test-query=SELECT 1

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false
spring.jpa.properties.hibernate.cache.use_second_level_cache=true
spring.jpa.properties.hibernate.cache.region.factory_class=org.hibernate.cache.jcache.JCacheRegionFactory

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
spring.flyway.clean-disabled=true

# JWT Configuration - CRITICAL: Must be set via environment variables
jwt.secret.key=${JWT_SECRET_KEY}
jwt.expiration.time=604800000
jwt.refresh.expiration.time=${JWT_REFRESH_EXPIRATION_TIME:86400000}
jwt.issuer=${JWT_ISSUER:bookmyhotel-production}

# Security Configuration
security.jwt.cookie-name=__Host-JWT-Token
security.jwt.cookie-secure=true
security.jwt.cookie-http-only=true
security.jwt.cookie-same-site=strict

# Session Management Configuration
security.session.timeout.minutes=15
security.session.max-concurrent=3
security.session.cleanup.interval.minutes=2

# Password Security Configuration
security.password.min-length=12
security.password.max-length=128
security.password.require-uppercase=true
security.password.require-lowercase=true
security.password.require-digits=true
security.password.require-special-chars=true

# Server Configuration
server.port=${PORT:8080}
server.address=0.0.0.0
server.error.include-stacktrace=never
server.error.include-message=never
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
server.compression.min-response-size=1024
server.http2.enabled=true
server.max-http-request-header-size=32KB
server.tomcat.max-http-form-post-size=50MB

# Actuator Configuration - Restricted for production
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true
management.prometheus.metrics.export.enabled=true
management.server.port=8081

# Logging Configuration
logging.level.com.bookmyhotel=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.web=WARN
logging.level.org.springframework.transaction=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{tenantId}] %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{tenantId}] %logger{36} - %msg%n

# Cache Configuration - Redis for production
spring.cache.type=redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=20
spring.data.redis.lettuce.pool.max-idle=10
spring.data.redis.lettuce.pool.min-idle=5

# CORS Configuration
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
app.cors.allowed-headers=Authorization,Content-Type,X-Requested-With,X-Tenant-ID,X-Hotel-ID
app.cors.allow-credentials=true

# Payment Configuration
stripe.api.key=${STRIPE_API_KEY}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET}

# Ethiopian Mobile Payment Configuration
mbirr.api.base-url=${MBIRR_API_BASE_URL:https://api.mbirr.et}
mbirr.api.key=${MBIRR_API_KEY}
mbirr.api.secret=${MBIRR_API_SECRET}
mbirr.merchant.id=${MBIRR_MERCHANT_ID}
mbirr.merchant.code=${MBIRR_MERCHANT_CODE}
mbirr.webhook.secret=${MBIRR_WEBHOOK_SECRET}
mbirr.payment.timeout=600

telebirr.api.base-url=${TELEBIRR_API_BASE_URL:https://api.telebirr.et}
telebirr.api.key=${TELEBIRR_API_KEY}
telebirr.api.secret=${TELEBIRR_API_SECRET}
telebirr.merchant.id=${TELEBIRR_MERCHANT_ID}
telebirr.merchant.code=${TELEBIRR_MERCHANT_CODE}
telebirr.webhook.secret=${TELEBIRR_WEBHOOK_SECRET}
telebirr.payment.timeout=600

# Ethiopian Payment General Settings
ethiopian.payment.currency=ETB
ethiopian.payment.country=ET
ethiopian.payment.return-url=${app.url}/booking-confirmation
ethiopian.payment.cancel-url=${app.url}/booking-failed

# Email Configuration
microsoft.graph.client-id=${MICROSOFT_GRAPH_CLIENT_ID}
microsoft.graph.tenant-id=${MICROSOFT_GRAPH_TENANT_ID}
microsoft.graph.client-secret=${MICROSOFT_GRAPH_CLIENT_SECRET}
microsoft.graph.scopes=https://graph.microsoft.com/.default

# AWS S3 Configuration for Image Storage
aws.s3.bucket.name=bookmyhotel-images
aws.s3.region=us-east-1
aws.s3.access-key-id=AKIAX3DNHBUZ4U5SX4GJ
aws.s3.secret-access-key=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

# Image Upload Configuration
image.upload.max-file-size=10MB
image.upload.max-width=2048
image.upload.max-height=2048
image.upload.allowed-types=image/jpeg,image/jpg,image/png,image/webp
image.upload.allowed-extensions=jpg,jpeg,png,webp

# Application Settings
app.name=BookMyHotel
app.url=${APP_FRONTEND_URL}
app.email.from=${APP_EMAIL_FROM}

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Threading Configuration
spring.task.execution.pool.core-size=10
spring.task.execution.pool.max-size=50
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=async-

# Connection Timeout Configuration
spring.mvc.async.request-timeout=30000