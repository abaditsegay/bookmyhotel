<svg width="120" height="40" viewBox="0 0 120 40" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="samsHotelGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E7D32;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="samsAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9800;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F57C00;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main building -->
  <rect x="8" y="12" width="16" height="23" fill="url(#samsHotelGradient)" rx="2" />
  <rect x="26" y="8" width="20" height="27" fill="url(#samsHotelGradient)" rx="2" />
  
  <!-- Entrance canopy -->
  <rect x="28" y="30" width="16" height="3" fill="url(#samsAccent)" />
  <rect x="30" y="33" width="12" height="2" fill="url(#samsAccent)" opacity="0.7" />
  
  <!-- Windows pattern -->
  <rect x="11" y="15" width="2" height="3" fill="white" opacity="0.9" />
  <rect x="15" y="15" width="2" height="3" fill="white" opacity="0.9" />
  <rect x="19" y="15" width="2" height="3" fill="white" opacity="0.9" />
  <rect x="11" y="20" width="2" height="3" fill="white" opacity="0.9" />
  <rect x="15" y="20" width="2" height="3" fill="white" opacity="0.9" />
  <rect x="19" y="20" width="2" height="3" fill="white" opacity="0.9" />
  
  <rect x="29" y="12" width="2" height="3" fill="white" opacity="0.9" />
  <rect x="33" y="12" width="2" height="3" fill="white" opacity="0.9" />
  <rect x="37" y="12" width="2" height="3" fill="white" opacity="0.9" />
  <rect x="41" y="12" width="2" height="3" fill="white" opacity="0.9" />
  <rect x="29" y="17" width="2" height="3" fill="white" opacity="0.9" />
  <rect x="33" y="17" width="2" height="3" fill="white" opacity="0.9" />
  <rect x="37" y="17" width="2" height="3" fill="white" opacity="0.9" />
  <rect x="41" y="17" width="2" height="3" fill="white" opacity="0.9" />
  
  <!-- Hotel text -->
  <text x="50" y="16" font-family="sans-serif" font-size="9" font-weight="bold" fill="white">SAM'S</text>
  <text x="50" y="26" font-family="sans-serif" font-size="8" font-weight="normal" fill="white">HOTEL</text>
  <text x="50" y="34" font-family="sans-serif" font-size="6" font-weight="normal" fill="white" opacity="0.8">AT BOLE</text>
  
  <!-- Ethiopian flag colors accent -->
  <rect x="5" y="8" width="2" height="6" fill="#0F7B0F" />
  <rect x="5" y="14" width="2" height="6" fill="#FFFF00" />
  <rect x="5" y="20" width="2" height="6" fill="#FF0000" />
  
  <!-- Decorative elements -->
  <circle cx="95" cy="12" r="3" fill="url(#samsAccent)" opacity="0.8" />
  <circle cx="105" cy="18" r="2" fill="url(#samsAccent)" opacity="0.6" />
  <circle cx="100" cy="28" r="2.5" fill="url(#samsAccent)" opacity="0.7" />
</svg>