  </defs>
  
  <!-- Hotel building silhouette -->
  <rect x="5" y="15" width="8" height="20" fill="url(#grandPlazaGradient)" />
  <rect x="15" y="10" width="10" height="25" fill="url(#grandPlazaGradient)" />
  <rect x="27" y="8" width="12" height="27" fill="url(#grandPlazaGradient)" />
  
  <!-- Windows -->
  <rect x="7" y="17" width="2" height="2" fill="white" opacity="0.8" />
