<svg width="120" height="40" viewBox="0 0 120 40" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="addisGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9800;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F57C00;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="sunGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFD54F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF9800;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Sun rays -->
  <line x1="5" y1="8" x2="8" y2="11" stroke="#FFD54F" stroke-width="1" opacity="0.8" />
  <line x1="8" y1="5" x2="8" y2="9" stroke="#FFD54F" stroke-width="1" opacity="0.8" />
  <line x1="11" y1="8" x2="14" y2="11" stroke="#FFD54F" stroke-width="1" opacity="0.8" />
  <line x1="5" y1="15" x2="9" y2="15" stroke="#FFD54F" stroke-width="1" opacity="0.8" />
  <line x1="13" y1="15" x2="17" y2="15" stroke="#FFD54F" stroke-width="1" opacity="0.8" />
  
  <!-- Sun -->
  <circle cx="11" cy="15" r="6" fill="url(#sunGradient)" />
  
  <!-- Hotel building -->
  <rect x="22" y="10" width="14" height="25" fill="url(#addisGradient)" rx="2" />
  <rect x="38" y="8" width="18" height="27" fill="url(#addisGradient)" rx="2" />
  
  <!-- Ethiopian architectural elements -->
  <rect x="24" y="32" width="10" height="3" fill="#8D6E63" />
  <rect x="40" y="32" width="14" height="3" fill="#8D6E63" />
  
  <!-- Windows with Ethiopian cross pattern -->
  <rect x="25" y="13" width="2" height="3" fill="white" opacity="0.9" />
  <rect x="29" y="13" width="2" height="3" fill="white" opacity="0.9" />
  <rect x="33" y="13" width="2" height="3" fill="white" opacity="0.9" />
  <rect x="25" y="18" width="2" height="3" fill="white" opacity="0.9" />
  <rect x="29" y="18" width="2" height="3" fill="white" opacity="0.9" />
  <rect x="33" y="18" width="2" height="3" fill="white" opacity="0.9" />
  <rect x="25" y="23" width="2" height="3" fill="white" opacity="0.9" />
  <rect x="29" y="23" width="2" height="3" fill="white" opacity="0.9" />
  <rect x="33" y="23" width="2" height="3" fill="white" opacity="0.9" />
  
  <rect x="41" y="12" width="2" height="3" fill="white" opacity="0.9" />
  <rect x="45" y="12" width="2" height="3" fill="white" opacity="0.9" />
  <rect x="49" y="12" width="2" height="3" fill="white" opacity="0.9" />
  <rect x="53" y="12" width="2" height="3" fill="white" opacity="0.9" />
  <rect x="41" y="17" width="2" height="3" fill="white" opacity="0.9" />
  <rect x="45" y="17" width="2" height="3" fill="white" opacity="0.9" />
  <rect x="49" y="17" width="2" height="3" fill="white" opacity="0.9" />
  <rect x="53" y="17" width="2" height="3" fill="white" opacity="0.9" />
  
  <!-- Hotel text -->
  <text x="62" y="15" font-family="serif" font-size="7" font-weight="bold" fill="white">ADDIS</text>
  <text x="62" y="23" font-family="serif" font-size="7" font-weight="bold" fill="white">SUNSHINE</text>
  <text x="62" y="30" font-family="serif" font-size="6" font-weight="normal" fill="white" opacity="0.8">HOTEL</text>
  
  <!-- Ethiopian colors accent -->
  <rect x="19" y="8" width="2" height="4" fill="#0F7B0F" />
  <rect x="19" y="12" width="2" height="4" fill="#FFFF00" />
  <rect x="19" y="16" width="2" height="4" fill="#FF0000" />
  
  <!-- Star of David (Ethiopian symbol) -->
  <polygon points="108,10 110,14 114,14 111,17 112,21 108,19 104,21 105,17 102,14 106,14" fill="#FFD54F" opacity="0.8" />
</svg>