name: Deploy to Production

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy-backend:
    name: Build & Deploy Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'
          cache: 'maven'

      - name: Build backend JAR
        working-directory: backend
        run: mvn clean package -DskipTests -q

      - name: Write production config
        run: |
          mkdir -p /tmp/bookmyhotel-config
          cat > /tmp/bookmyhotel-config/application-prod.properties << 'EOF'
          # Auto-generated by GitHub Actions — do not edit on server manually
          # Database
          spring.datasource.url=jdbc:mysql://${{ vars.MYSQL_HOST }}:${{ vars.MYSQL_PORT }}/${{ vars.MYSQL_DATABASE }}?serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
          spring.datasource.username=${{ vars.MYSQL_USER }}
          spring.datasource.password=${{ secrets.MYSQL_PASSWORD }}
          spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

          # JPA
          spring.jpa.hibernate.ddl-auto=validate
          spring.jpa.show-sql=false
          spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
          spring.jpa.properties.hibernate.format_sql=false
          spring.jpa.open-in-view=false

          # Flyway
          spring.flyway.enabled=false

          # Connection pool
          spring.datasource.hikari.maximum-pool-size=10
          spring.datasource.hikari.minimum-idle=5
          spring.datasource.hikari.connection-timeout=30000
          spring.datasource.hikari.idle-timeout=600000
          spring.datasource.hikari.max-lifetime=1800000

          # Server
          server.port=${{ vars.SERVER_PORT }}
          server.address=0.0.0.0
          server.servlet.context-path=${{ vars.SERVER_SERVLET_CONTEXT_PATH }}
          server.compression.enabled=true
          server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,application/javascript,text/css
          spring.application.name=bookmyhotel

          # CORS
          app.cors.allowed-origins=${{ vars.CORS_ALLOWED_ORIGINS }}
          app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
          app.cors.allowed-headers=*
          app.cors.allow-credentials=true

          # App URLs
          app.url=${{ vars.APP_FRONTEND_URL }}
          app.frontend.url=${{ vars.APP_FRONTEND_URL }}
          app.name=${{ vars.APP_NAME }}
          app.uat.shared-hotel-id=${{ vars.APP_UAT_SHARED_HOTEL_ID || '1' }}
          app.uat.shared-hotel-name=${{ vars.APP_UAT_SHARED_HOTEL_NAME || 'Grand Plaza Hotel' }}

          # JWT
          jwt.secret.key=${{ secrets.JWT_SECRET }}
          jwt.expiration.time=${{ vars.JWT_EXPIRATION }}

          # Email
          app.email.from=${{ vars.APP_EMAIL_FROM }}
          spring.mail.host=${{ vars.SPRING_MAIL_HOST }}
          spring.mail.port=${{ vars.SPRING_MAIL_PORT }}
          spring.mail.username=${{ secrets.SPRING_MAIL_USERNAME }}
          spring.mail.password=${{ secrets.SPRING_MAIL_PASSWORD }}
          spring.mail.properties.mail.smtp.auth=true
          spring.mail.properties.mail.smtp.starttls.enable=true

          # Microsoft Graph
          microsoft.graph.client-id=${{ secrets.GRAPH_CLIENT_ID }}
          microsoft.graph.tenant-id=${{ secrets.GRAPH_TENANT_ID }}
          microsoft.graph.client-secret=${{ secrets.GRAPH_CLIENT_SECRET }}
          microsoft.graph.scopes=${{ vars.MICROSOFT_GRAPH_SCOPES }}

          # Image storage
          image.upload.base-directory=${{ vars.IMAGE_UPLOAD_BASE_DIR }}
          image.upload.base-url=${{ vars.IMAGE_UPLOAD_BASE_URL }}
          image.upload.max-file-size=10MB
          image.upload.max-width=2048
          image.upload.max-height=2048
          image.upload.allowed-types=image/jpeg,image/jpg,image/png,image/webp
          image.upload.allowed-extensions=jpg,jpeg,png,webp

          # Logging
          logging.level.com.bookmyhotel=INFO
          logging.level.org.springframework.security=WARN
          logging.level.org.hibernate.SQL=WARN
          logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
          logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
          logging.file.name=/opt/bookmyhotel/logs/application.log
          logging.file.max-size=10MB
          logging.file.max-history=30

          # Actuator
          management.endpoints.web.exposure.include=health,info,metrics
          management.endpoint.health.show-details=when-authorized
          management.endpoints.web.base-path=/actuator

          # Error handling
          server.error.include-stacktrace=never
          server.error.include-message=never

          # Security headers
          server.servlet.session.cookie.secure=true
          server.servlet.session.cookie.http-only=true
          server.servlet.session.cookie.same-site=strict

          # Multipart
          spring.servlet.multipart.max-file-size=10MB
          spring.servlet.multipart.max-request-size=10MB
          EOF

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LIGHTSAIL_SSH_KEY_B64 }}" | base64 -d > ~/.ssh/bookmyhotel-aws
          chmod 600 ~/.ssh/bookmyhotel-aws
          ssh-keyscan -H ${{ vars.LIGHTSAIL_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Backup current JAR on server
        run: |
          ssh -i ~/.ssh/bookmyhotel-aws ${{ vars.LIGHTSAIL_USER }}@${{ vars.LIGHTSAIL_HOST }} \
            'if [ -f /opt/bookmyhotel/app.jar ]; then cp /opt/bookmyhotel/app.jar /opt/bookmyhotel/app.jar.backup; fi'

      - name: Upload JAR
        run: |
          scp -i ~/.ssh/bookmyhotel-aws \
            backend/target/*.jar \
            ${{ vars.LIGHTSAIL_USER }}@${{ vars.LIGHTSAIL_HOST }}:/opt/bookmyhotel/app.jar

      - name: Upload config
        run: |
          scp -i ~/.ssh/bookmyhotel-aws \
            /tmp/bookmyhotel-config/application-prod.properties \
            ${{ vars.LIGHTSAIL_USER }}@${{ vars.LIGHTSAIL_HOST }}:/opt/bookmyhotel/config/application-prod.properties

      - name: Restart backend service
        run: |
          ssh -i ~/.ssh/bookmyhotel-aws ${{ vars.LIGHTSAIL_USER }}@${{ vars.LIGHTSAIL_HOST }} \
            'sudo systemctl restart bookmyhotel-backend.service'

      - name: Wait for health check
        run: |
          echo "Waiting for backend to start..."
          for i in $(seq 1 60); do
            if ssh -i ~/.ssh/bookmyhotel-aws \
                  -o ConnectTimeout=5 \
                  ${{ vars.LIGHTSAIL_USER }}@${{ vars.LIGHTSAIL_HOST }} \
                  "curl -sf --max-time 5 http://localhost:${{ vars.SERVER_PORT }}${{ vars.SERVER_SERVLET_CONTEXT_PATH }}/actuator/health" \
                  2>/dev/null; then
              echo ""
              echo "✅ Backend is healthy"
              exit 0
            fi
            echo -n "."
            sleep 5
          done
          echo ""
          echo "❌ Backend health check failed after 5 minutes"
          ssh -i ~/.ssh/bookmyhotel-aws ${{ vars.LIGHTSAIL_USER }}@${{ vars.LIGHTSAIL_HOST }} \
            'sudo journalctl -u bookmyhotel-backend.service --no-pager -n 50'
          exit 1

  deploy-frontend:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install --legacy-peer-deps

      - name: Build React app
        working-directory: frontend
        run: npm run build
        env:
          CI: false  # treat warnings as warnings, not errors
          REACT_APP_API_URL: https://bookmystay.shegersolutions.com/managemyhotel/api
          REACT_APP_SERVER_URL: https://bookmystay.shegersolutions.com/managemyhotel

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LIGHTSAIL_SSH_KEY_B64 }}" | base64 -d > ~/.ssh/bookmyhotel-aws
          chmod 600 ~/.ssh/bookmyhotel-aws
          ssh-keyscan -H ${{ vars.LIGHTSAIL_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Package build
        working-directory: frontend
        run: tar -czf /tmp/frontend-build.tar.gz -C build .

      - name: Upload build to server
        run: |
          scp -i ~/.ssh/bookmyhotel-aws \
            /tmp/frontend-build.tar.gz \
            ${{ vars.LIGHTSAIL_USER }}@${{ vars.LIGHTSAIL_HOST }}:/tmp/frontend-build.tar.gz

      - name: Deploy on server
        run: |
          ssh -i ~/.ssh/bookmyhotel-aws ${{ vars.LIGHTSAIL_USER }}@${{ vars.LIGHTSAIL_HOST }} << 'REMOTE'
            set -e
            DEPLOY_PATH="/var/www/bookmystay"
            BACKUP_DIR="/tmp/frontend-backup-$(date +%Y%m%d-%H%M%S)"

            # Backup current build
            if [ -d "$DEPLOY_PATH" ] && [ "$(ls -A $DEPLOY_PATH)" ]; then
              mkdir -p "$BACKUP_DIR"
              cp -r "$DEPLOY_PATH/." "$BACKUP_DIR/"
            fi

            # Deploy new build
            sudo rm -rf "$DEPLOY_PATH"/*
            sudo tar -xzf /tmp/frontend-build.tar.gz -C "$DEPLOY_PATH"
            sudo chown -R www-data:www-data "$DEPLOY_PATH" 2>/dev/null || true
            rm -f /tmp/frontend-build.tar.gz

            # Reload nginx
            sudo nginx -t && sudo systemctl reload nginx
            echo "✅ Frontend deployed"
          REMOTE
